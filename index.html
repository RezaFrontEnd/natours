<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natours | Existing tours adventurous people</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">
</head>

<body>

    <div class="navigation">
        <input type="checkbox" class="navigation-checkbox" id="navi-toggle">
        <label for="navi-toggle" class="navigation-button">
            <span class="navigation-icon">

            </span>
        </label>
        <div class="navigation-background">&nbsp;</div>
        <nav class="navigation-nav">
            <ul class="navigation-list">
                <li class="navigation-item"><a href="#" class="navigation-link"><span>01</span>About Natous</a></li>
                <li class="navigation-item"><a href="#" class="navigation-link"><span>02</span>your benefits</a></li>
                <li class="navigation-item"><a href="#" class="navigation-link"><span>03</span>popular tours</a></li>
                <li class="navigation-item"> <a href="#" class="navigation-link"><span>04</span>stories</a></li>
                <li class="navigation-item"><a href="#" class="navigation-link"><span>05</span>stories</a></li>
            </ul>
        </nav>
    </div>

    <!-- start header -->
    <header class="header">
        <div class="logo-box">
            <img src="" alt="logo" class="logo">
        </div>
        <div class="text-box">
            <h1 class="heading-primary">
                <span class="heading-primary-main"></span>
                <span class="heading-primary-sub"></span>
            </h1>
            <a href="" class="btn btn-white btn-animated"></a>
        </div>
    </header>
    <!-- end header -->
    <main>
        <!-- start about -->
        <section class="section-about">
            <div class="u-center-text margin-buttom-big">
                <h2 class="heading-secondary">
                    
                </h2>
            </div>
            <div class="wrapper">
                <div class="textContent">
                    <h3 class="heading-tertiary margin-buttom-small" id="heading-tertiary-1">
                        
                    </h3>
                    <p class="paragraph" id="paragraph1">
                       
                    </p>
                    <h3 class="heading-tertiary" id="heading-tertiary-2"></h3>
                    <p class="paragraph" id="paragraph2">
                        
                    </p>
                    <a href="" class="btn-text"></a>

                </div>
                <div class="img">
                    <div class="composition">
                        <img src="" class="composition-photo composition-photo-p1">
                        <img src="" class="composition-photo composition-photo-p2">
                        <img src="" class="composition-photo composition-photo-p3">

                    </div>
                </div>
            </div>

        </section>
        <!-- end about -->

        <!-- start section tours -->
        <section class="section-tours">
            <div class="u-center-text margin-buttom-big">
                <h2 class="heading-secondary" id="heading-secondary-2">
                    
                </h2>
            </div>
            <div class="card-wrapper">
                <div class="card">
                    <div class="card-side card-side-front">
                        <div class="card-picture card-picure-1">

                        </div>
                        <h4 class="card-heading">
                            <span class="card-heading-span card-heading-span-1" id="card-heading-1">
                                
                            </span>
                        </h4>
                        <div class="card-details">
                            <ul>
                                <li class="list-item-1"></li>
                                <li class="list-item-2"></li>
                                <li class="list-item-3"></li>
                                <li class="list-item-4"></li>
                                <li class="list-item-5"></li>
                            </ul>
                        </div>
                    </div>
                    <div class="card-side card-side-back card-side-back-1">
                        <div class="card-cta">
                            <div class="card-price-box">
                                <p class="card-price-only" id="card-price-only-1"></p>
                                <p class="cart-price-value" id="card-price-value-1"></p>
                            </div>
                            <a href="#popup" class="btn btn-white" id="book-now"></a>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-side card-side-front">
                        <div class="card-picture card-picure-2">

                        </div>
                        <h4 class="card-heading">
                            <span class="card-heading-span card-heading-span-2" id="card-heading-2">
                                
                            </span>
                        </h4>
                        <div class="card-details">
                            <ul>
                                <li class="list_item_1"></li>
                                <li class="list_item_2"></li>
                                <li class="list_item_3"></li>
                                <li class="list_item_4"></li>
                                <li class="list_item_5"></li>
                            </ul>
                        </div>
                    </div>
                    <div class="card-side card-side-back card-side-back-2">
                        <div class="card-cta">
                            <div class="card-price-box">
                                <p class="card-price-only" id="card-price-only-2"></p>
                                <p class="cart-price-value" id="card-price-value-2"></p>
                            </div>
                            <a href="#popup" class="btn btn-white" id="book-now-2"></a>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-side card-side-front">
                        <div class="card-picture card-picure-3">

                        </div>
                        <h4 class="card-heading">
                            <span class="card-heading-span card-heading-span-3" id="card-heading-3">
                                
                            </span>
                        </h4>
                        <div class="card-details">
                            <ul>
                                <li class="item-list-1"></li>
                                <li class="item-list-2"></li>
                                <li class="item-list-3"></li>
                                <li class="item-list-4"></li>
                                <li class="item-list-5"></li>
                            </ul>
                        </div>
                    </div>
                    <div class="card-side card-side-back card-side-back-3">
                        <div class="card-cta">
                            <div class="card-price-box">
                                <p class="card-price-only" id="card-price-only-3"></p>
                                <p class="cart-price-value" id="card-price-value-3"></p>
                            </div>
                            <a href="#popup" class="btn btn-white" id="book-now-3"></a>
                        </div>
                    </div>
                </div>

            </div>
            </div>
            <div class="u-center-text">
                <a href="" class="btn btn-green" id="discover"></a>
            </div>
        </section>
        <!-- end section tours -->

        <!-- start section stories -->
        <section class="section-stories">
            <div class="bg-video">
                <video class="bg-video" autoplay muted loop>
                    <source src="#" type="video/mp4" class="content">
                    your browser is not supported
                </video>
            </div>
            <div class="u-center-text margin-bottom-big">
                <h2 class="heading-secondary" id="heading-secondary-3"> 
                </h2>
            </div>
            <div class="story">
                <figure class="story-shape">
                    <img src="img/double-room.jpeg" alt="person on tour" class="story-image">
                    <figcaption class="story-caption"></figcaption>
                </figure>
                <div class="story-text margin-bottom-small">
                    <h3 class="heading-tertiary" id="heading-tertiary-3">
                        
                    </h3>
                    <p class="paragraph-3"></p>
                </div>
            </div>
            <div class="story">
                <figure class="story-shape">
                    <img src="img/single-room.jpeg" alt="person on tour" class="story-image">
                    <figcaption class="story-caption" id="story-caption-2"></figcaption>
                </figure>
                <div class="story-text margin-bottom-small">
                    <h3 class="heading-tertiary" id="heading-tertiary-4">
                        
                    </h3>
                    <p class="paragraph-4"></p>
                </div>
            </div>
            <div class="u-center-text">
                <a href="#" class="btn btn-green btn-text" id="btn-text-2"></a>
            </div>

        </section>
        <!-- end section stories -->
        <!-- start book session -->
        <section class="book-session">
            <div class="book">
                <div class="book-form">
                    <form action="#" class="form">
                        <div class="u-center-text">
                            <h2 class="heading-secondary" id="heading-secondary-4">
                               
                            </h2>
                        </div>
                        <div class="form-group">
                            <input type="text" class="form-input" placeholder="fullname" id="name" required>
                            <label for="name" class="form-label" id="form-label-1"></label>
                        </div>
                        <div class="form-group">
                            <input type="email" class="form-input" placeholder="Email adress" id="email" required>
                            <label for="email" class="form-label" id="form-label-2"></label>
                        </div>
                        <div class="form-group">
                            <div class="form-radio-group">
                                <input type="radio" class="form-radio-input" id="small" name="size">
                                <label for="small" class="form-radio-label" id="form-radio-label-1"></label>
                                <span class="form-radio-button"></span>

                            </div>
                            <div class="form-radio-group">
                                <input type="radio" class="form-radio-input" id="big" name="size">
                                <label for="big" class="form-radio-label" id="form-radio-label-2"></label>
                                <span class="form-radio-button"></span>

                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </section>
        <!-- end book session -->
    </main>
    <div class="popup" id="popup">
        <div class="popup-content">
            <div class="popup-left">
                <img src="img/gallery-img-3.jpeg" alt="tour photo" class="popup-img">
                <img src="img/gallery-img-4.jpeg" alt="tour-photo" class="popup-img">
            </div>
            <div class="popup-right">
                <a href="#section-tours" class="popup-close">&times;</a>
                <h2 class="heading-secondary" id="heading-secondary-5"></h2>
                <h3 class="heading-tertiary" id="heading-tertiary-5"></h3>
                <p class="popup-text">
                </p>
                <a href="popup-text" class="btn btn-green" id="book-now-4"></a>
            </div>
        </div>
    </div>
</body>
<script src="js/natours.js"></script>
<script src="bootstrap-5.3.8-dist/js/bootstrap.bundle.js"></script>

</html>
